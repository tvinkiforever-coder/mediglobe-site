<!DOCTYPE html>

<style>

  html,body{height:100%}
  body{margin:0;background:#05100b;color:#eaf4ee;font-family:Manrope,system-ui,sans-serif;-webkit-font-smoothing:antialiased;

  .logo{display:inline-flex;align-items:center;gap:10px;margin-bottom:28px;opacity:.9}

</head>
